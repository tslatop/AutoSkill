interface:
  display_name: "Local Skill Manager"
  short_description: "Proactively manage reusable local skills"
  default_prompt: "Use $autoskill to proactively review this session in the background, extract only reusable skill material, offer candidate titles or accept a custom topic when direction is ambiguous, preserve the user's or target skill's language, search similar local and external skills, score candidates by evidence and value, fully draft the proposed skill or diff, then ask for approval before changing skill files."
